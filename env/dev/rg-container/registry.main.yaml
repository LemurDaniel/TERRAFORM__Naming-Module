#########################################################
#
# Configuration for the container registry
#
#

name: stuff
sku: Standard

admin_enabled: false
anonymous_pull_enabled: false
network_rule_bypass_option:

georeplications:

# Custom scope maps
scope_map:

token:
  - token_name: "user-image-pull"
    scope_map: "_repositories_pull"
    password_1:
      enabled: true
      expiry: null
      key_vault_secret: null
  - token_name: "user-image-push"
    scope_map: "_repositories_push"
    password_1:
      enabled: true
      expiry: null
      key_vault_secret: null
  - token_name: "user-admin"
    scope_map: "_repositories_admin"
    password_1:
      enabled: true
      expiry: null
      key_vault_secret: null
