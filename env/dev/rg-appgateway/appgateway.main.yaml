name:
sku:
  name: Standard_v2
  tier: Standard_v2

network:
  subnet_key: appgateway

rewrite_rule_set:

backend_pool:
  - name: google
    protocol: Https
    fqdn: google.com

frontend_listener:
  - name: google
    protocol: Http
    backend_pool: google