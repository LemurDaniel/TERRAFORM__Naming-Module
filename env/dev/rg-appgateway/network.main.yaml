#########################################################
#
# The main virutal network
#
#

# Put it in an existing resource group
resource_group:

name: main
address_prefix: 10.0.10.0/24

# File filter for the nsg files. Like in a subfolder: ./nsg/nsg.*.yaml
file_filter_nsg: ./nsg/nsg.*.yaml

subnet:
  #
  # The subnet for deploying the appservices
  #
  - name: appgateway

    address_prefix: 10.0.10.0/28
    service_endpoints:
    nsg_association:

    delegations:
