#########################################################
#
# VM backup policy yearly: 1 year
#
#

policy_type: V2

instant_restore_retention_days: 5
timezone: W. Europe Standard Time

backup:
    frequency: Daily
    time: 20:30

retention_daily:
    count: 31

retention_weekly:
    count: 26
    weekdays:
        - Friday

retention_monthly:
    count: 12
    weekdays:
        - Saturday
    weeks:
        - First

retention_yearly:
    count: 1
    weekdays:
        - Sunday
    weeks:
        - First
    months:
        - January
