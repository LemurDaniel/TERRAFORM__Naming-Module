#########################################################
#
# The main virutal network
#
#

# Put it in an existing resource group
resource_group:

name: main
address_prefix: 10.0.10.0/24

# File filter for the nsg files. Like in a subfolder: ./nsg/nsg.*.yaml
file_filter_nsg: ./nsg/nsg.*.yaml

public_ip:
  - name: "01"
    sku: Standard
    domain: sometesting
    allocation: Static
    zones: [1, 2, 3]

subnet:
  #
  # The subnet for deploying the appservices
  #
  - name: appservice

    address_prefix: 10.0.10.0/28
    service_endpoints:
    nsg_association: appgw

    delegations:

  #
  # The subnet for deploying all databases
  #
  - name: database

    address_prefix: 10.0.10.16/28
    nsg_association:
    service_endpoints:
      - Microsoft.Storage

    delegations:
