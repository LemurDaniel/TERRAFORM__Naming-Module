#########################################################
#
# The network security group for the Application Gateway
#
#

inbound_rules:
  Allow-GatewayManager-To-APPGW:
    access: Allow
    priority: 100
    protocol: Tcp
    source_port_range: "*"
    destination_port_range: 65200-65535
    source_address_prefix: GatewayManager
    destination_address_prefix: "*"
  Allow-Internet-To-APPGW:
    access: Allow
    priority: 110
    protocol: Tcp
    source_port_range: "*"
    destination_port_range: 443
    source_address_prefix: Internet
    destination_address_prefix: "*"
  Allow-FrontDoor-To-APPGW:
    access: Allow
    priority: 120
    protocol: Tcp
    source_port_range: "*"
    destination_port_range: 444
    source_address_prefix: Internet
    destination_address_prefix: "*"

outbound_rules:
  Allow-AppGateway-To-APIM:
    access: Allow
    priority: 110
    protocol: Tcp
    source_port_range: "*"
    destination_port_range: 443
    source_address_prefix: 10.148.128.96/28
    destination_address_prefix: 10.148.128.0/28
